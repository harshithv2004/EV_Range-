<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — EV Range Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow glow-1"></div>

<div class="page-wrapper" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;">
    <div style="font-size:4rem;margin-bottom:1rem;">⚠️</div>
    <h1 class="hero-title" style="font-size:clamp(2rem,5vw,3rem);">Something went wrong</h1>
    <p class="hero-sub" style="max-width:480px;margin:1rem auto 2rem;">
        {{ message or "An unexpected error occurred. Please try again." }}
    </p>
    <a href="{{ url_for('index') }}" class="submit-btn" style="text-decoration:none;">
        <span class="btn-text">Go Back</span>
    </a>
</div>
</body>
</html>
